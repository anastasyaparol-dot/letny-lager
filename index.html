// ── IndexedDB для фото ────────────────────────────────────────────────────────

const DB_NAME = 'letny-lager';
const DB_VERSION = 1;
const STORE = 'posture-photos';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      e.target.result.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function dbAddPhoto(photo) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).add(photo);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function dbGetPhotos() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result.reverse());
    req.onerror = (e) => reject(e.target.error);
  });
}

async function dbDeletePhoto(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = (e) => reject(e.target.error);
  });
}

const STORAGE_KEY = 'летний-лагерь-v1';
const dateKey = (d) => d.toISOString().slice(0, 10);
const todayDate = () => new Date();

const getTodayBlock = () => {
  const blockId = WEEK_SCHEDULE[todayDate().getDay()];
  return blockId ? BLOCKS.find(b => b.id === blockId) : null;
};

const getDayOfYear = () => {
  const now = todayDate();
  return Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
};

const getTodayWarmup = () => WARMUPS[getDayOfYear() % WARMUPS.length];
const getDefaultActivity = (blockId) => ACTIVITIES[blockId][getDayOfYear() % ACTIVITIES[blockId].length];

const formatDate = (dateStr) => {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
};

  }

  if (phase === 'finish') {
    return (
      <div className="fade-in space-y-4">
        <div className="bg-white rounded-2xl border border-gray-200 p-5">
          <p className="font-bold text-gray-800 text-lg mb-4">Как прошло занятие?</p>
          <div className="grid grid-cols-3 gap-2 mb-4">
            {RESULTS.map(r => (
              <button key={r.id} onClick={() => setResult(r.id)}
                className={`py-3 rounded-xl border-2 flex flex-col items-center gap-1 transition-all ${result === r.id ? 'border-gray-700 bg-gray-50' : 'border-gray-200 hover:border-gray-300'}`}>
                <span className="text-2xl">{r.emoji}</span>
                <span className="text-xs text-gray-600 font-medium">{r.label}</span>
              </button>
            ))}
          </div>
          <textarea value={comment} onChange={e => setComment(e.target.value)}
            placeholder="Комментарий (необязательно) — что заметили, что понравилось..."
            className="w-full border border-gray-200 rounded-xl p-3 text-sm text-gray-700 resize-none focus:outline-none focus:border-gray-400"
            rows={3} />
        </div>
        <button
          onClick={() => {
            if (!result) return;
            onSave(key, { blockId: block.id, activityId: activity.id, warmupId: getTodayWarmup().id, result, comment, completed: true });
            setPhase('done');
          }}
          disabled={!result}
          className={`w-full py-4 rounded-2xl text-white font-bold text-base transition-colors ${result ? `${style.btn} cursor-pointer` : 'bg-gray-200 cursor-not-allowed text-gray-400'}`}>
          Сохранить
        </button>
        <button onClick={() => setPhase('plan')} className="w-full py-2 text-gray-400 text-sm hover:text-gray-600">← Назад</button>
      </div>
    );
  }

  return (
    <div className="space-y-4 fade-in">
      <div className={`rounded-2xl p-4 border ${style.bg} ${style.border}`}>
        <p className={`text-xs font-semibold uppercase tracking-wide ${style.text}`}>{block.emoji} Блок сегодня</p>
        <p className="text-xl font-bold text-gray-800 mt-0.5">{block.name}</p>
        <p className="text-sm text-gray-500">{block.desc}</p>
      </div>
      <div>
        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Разминка</p>
        <WarmupCard />
      </div>
      <div>
        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Основное занятие</p>
        {showSwap
          ? <SwapPanel blockId={block.id} currentId={activity.id} style={style}
              onSelect={a => { setActivity(a); setShowSwap(false); }}
              onClose={() => setShowSwap(false)} />
          : <ActivityCard activity={activity} style={style} onSwap={() => setShowSwap(true)} />
        }
      </div>
      <button onClick={() => setPhase('finish')}
        className={`w-full py-4 rounded-2xl text-white font-bold text-base ${style.btn} transition-colors`}>
        Занятие проведено ✓
      </button>
    </div>
  );

function PhotoSection() {
  const [photos, setPhotos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [adding, setAdding] = useState(false);
  const [note, setNote] = useState('');
  const [view, setView] = useState('front');
  const [preview, setPreview] = useState(null);
  const [enlarged, setEnlarged] = useState(null);
  const fileRef = useRef();

  useEffect(() => {
    dbGetPhotos().then(p => { setPhotos(p); setLoading(false); });
  }, []);

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setPreview(ev.target.result);
    reader.readAsDataURL(file);
  };

  const handleSave = async () => {
    if (!preview) return;
    const entry = {
      date: dateKey(todayDate()),
      view,
      note,
      dataUrl: preview,
    };
    const id = await dbAddPhoto(entry);
    setPhotos(prev => [{ ...entry, id }, ...prev]);
    setPreview(null);
    setNote('');
    setAdding(false);
    fileRef.current.value = '';
  };

  const handleDelete = async (id) => {
    await dbDeletePhoto(id);
    setPhotos(prev => prev.filter(p => p.id !== id));
  };

  const VIEW_LABELS = { front: 'Спереди', side: 'Сбоку', back: 'Сзади' };

  if (enlarged) {
    return (
      <div className="fixed inset-0 bg-black bg-opacity-90 z-50 flex flex-col" onClick={() => setEnlarged(null)}>
        <div className="flex items-center justify-between p-4">
          <div>
            <p className="text-white font-medium">{formatDate(enlarged.date)}</p>
            <p className="text-gray-400 text-sm">{VIEW_LABELS[enlarged.view]}{enlarged.note ? ` — ${enlarged.note}` : ''}</p>
          </div>
          <button className="text-white text-2xl" onClick={() => setEnlarged(null)}>✕</button>
        </div>
        <div className="flex-1 flex items-center justify-center p-4">
          <img src={enlarged.dataUrl} alt="" className="max-w-full max-h-full object-contain rounded-xl" onClick={e => e.stopPropagation()} />
        </div>
        <div className="p-4 flex justify-center">
          <button
            onClick={(e) => { e.stopPropagation(); if (confirm('Удалить фото?')) { handleDelete(enlarged.id); setEnlarged(null); } }}
            className="px-6 py-2 rounded-xl bg-red-500 text-white text-sm font-medium">
            Удалить
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="space-y-4">
      <input ref={fileRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={handleFile} />

      {adding ? (
        <div className="bg-white rounded-2xl border border-gray-200 p-4 fade-in space-y-3">
          <p className="font-semibold text-gray-800">Новое фото осанки</p>
          {preview ? (
            <div className="relative">
              <img src={preview} alt="" className="w-full rounded-xl object-cover max-h-72" />
              <button onClick={() => { setPreview(null); fileRef.current.value = ''; }}
                className="absolute top-2 right-2 w-7 h-7 rounded-full bg-black bg-opacity-50 text-white text-sm flex items-center justify-center">✕</button>
            </div>
          ) : (
            <button onClick={() => fileRef.current.click()}
              className="w-full py-10 rounded-xl border-2 border-dashed border-gray-300 text-gray-400 text-sm hover:border-gray-400 hover:text-gray-500">
              📷 Нажмите чтобы сделать фото
            </button>
          )}
          <div className="flex gap-2">
            {Object.entries(VIEW_LABELS).map(([k, label]) => (
              <button key={k} onClick={() => setView(k)}
                className={`flex-1 py-2 rounded-xl text-sm font-medium border-2 transition-all ${view === k ? 'border-gray-700 bg-gray-50 text-gray-800' : 'border-gray-200 text-gray-400'}`}>
                {label}
              </button>
            ))}
          </div>
          <input value={note} onChange={e => setNote(e.target.value)}
            placeholder="Заметка (необязательно)"
            className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-gray-400" />
          <div className="flex gap-2">
            <button onClick={() => { setAdding(false); setPreview(null); setNote(''); fileRef.current.value = ''; }}
              className="flex-1 py-2.5 rounded-xl border border-gray-300 text-gray-500 text-sm">Отмена</button>
            <button onClick={handleSave} disabled={!preview}
              className={`flex-1 py-2.5 rounded-xl text-white text-sm font-semibold ${preview ? 'bg-teal-500 hover:bg-teal-600' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
              Сохранить
            </button>
          </div>
        </div>
      ) : (
        <button onClick={() => setAdding(true)}
          className="w-full py-3.5 rounded-2xl bg-teal-500 hover:bg-teal-600 text-white font-semibold text-sm transition-colors">
          📷 Добавить фото осанки
        </button>
      )}

      {loading && <p className="text-center text-gray-400 text-sm py-8">Загрузка...</p>}

      {!loading && photos.length === 0 && !adding && (
        <div className="text-center py-12">
          <p className="text-4xl mb-3">📷</p>
          <p className="text-gray-500 font-medium">Нет фото</p>
          <p className="text-gray-400 text-sm mt-1">Сфотографируйте осанку первый раз</p>
        </div>
      )}

      {photos.length > 0 && (
        <div>
          <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">История фото</p>
          <div className="photo-grid">
            {photos.map(p => (
              <button key={p.id} onClick={() => setEnlarged(p)} className="text-left">
                <img src={p.dataUrl} alt="" className="photo-thumb" />
                <p className="text-xs text-gray-500 mt-1 truncate">{formatDate(p.date)}</p>
                <p className="text-xs text-gray-400">{VIEW_LABELS[p.view]}</p>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Прогресс ──────────────────────────────────────────────────────────────────

function ProgressView({ progress }) {
  const entries = Object.entries(progress).sort(([a],[b]) => b.localeCompare(a));

  if (entries.length === 0) {
    return (
      <div className="text-center py-20">
        <p className="text-5xl mb-4">📊</p>
        <p className="text-lg font-bold text-gray-600">Пока нет записей</p>
        <p className="text-gray-400 mt-1 text-sm">Проведите первое занятие и отметьте результат</p>
      </div>
    );
  }

  const streak = (() => {
    let count = 0;
    const d = new Date();
    for (let i = 0; i < 365; i++) {
      if (progress[dateKey(d)]) { count++; d.setDate(d.getDate()-1); }
      else break;
    }
    return count;
  })();

  const blockCounts = {};
  entries.forEach(([,e]) => { blockCounts[e.blockId] = (blockCounts[e.blockId]||0)+1; });
  const maxCount = Math.max(...Object.values(blockCounts), 1);

  return (
    <div className="space-y-4">
      <div className="grid grid-cols-2 gap-3">
        <div className="bg-white rounded-2xl border border-gray-200 p-4 text-center">
          <p className="text-3xl font-bold text-gray-800">{entries.length}</p>
          <p className="text-xs text-gray-400 mt-0.5">всего занятий</p>
        </div>
        <div className="bg-white rounded-2xl border border-gray-200 p-4 text-center">
          <p className="text-3xl font-bold text-gray-800">{streak}</p>
          <p className="text-xs text-gray-400 mt-0.5">дней подряд</p>
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-gray-200 p-4">
        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Блоки</p>
        <div className="space-y-2.5">
          {BLOCKS.map(b => {
            const count = blockCounts[b.id] || 0;
            const style = S[b.id];
            return (
              <div key={b.id} className="flex items-center gap-2">
                <span className="w-5 text-center text-sm">{b.emoji}</span>
                <span className="text-sm text-gray-600 w-20 flex-shrink-0">{b.name}</span>
                <div className="flex-1 bg-gray-100 rounded-full h-2">
                  <div className={`h-2 rounded-full ${style.bar} transition-all`} style={{width:`${(count/maxCount)*100}%`}} />
                </div>
                <span className="text-xs text-gray-400 w-4 text-right">{count}</span>
              </div>
            );
          })}
        </div>
      </div>

      <div className="space-y-2">
        {entries.map(([dateStr, entry]) => {
          const block = BLOCKS.find(b => b.id === entry.blockId);
          const act = block ? ACTIVITIES[block.id].find(a => a.id === entry.activityId) : null;
          const res = RESULTS.find(r => r.id === entry.result);
          const style = block ? S[block.id] : {};
          return (
            <div key={dateStr} className="bg-white rounded-2xl border border-gray-200 p-4">
              <div className="flex items-start justify-between gap-2">
                <div className="min-w-0">
                  <p className="text-xs text-gray-400 capitalize">{formatDate(dateStr)}</p>
                  <p className="font-semibold text-gray-800 mt-0.5">{act ? act.name : entry.activityId}</p>
                  {entry.comment && <p className="text-sm text-gray-500 mt-1 italic">«{entry.comment}»</p>}
                </div>
                <div className="flex flex-col items-end gap-1.5 flex-shrink-0">
                  {res && <span className="text-xl">{res.emoji}</span>}
                  {block && <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${style.tag}`}>{block.emoji} {block.name}</span>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────

function App() {
  const [view, setView] = useState('today');
  const [progress, setProgress] = useState(loadProgress);

  const handleSave = useCallback((key, entry) => {
    setProgress(prev => {
      const next = { ...prev, [key]: entry };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      return next;
    });
  }, []);

  const todayStr = todayDate().toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
  const todayDone = !!progress[dateKey(todayDate())];

  return (
    <div className="max-w-md mx-auto min-h-screen flex flex-col">
      <header className="sticky top-0 bg-amber-50 z-10 px-4 pt-6 pb-3 border-b border-amber-100">
        <div className="flex items-center justify-between mb-3">
          <div>
            <h1 className="text-xl font-bold text-gray-800">Летний лагерь ☀️</h1>
            <p className="text-xs text-gray-400 capitalize mt-0.5">{todayStr}</p>
          </div>
          {todayDone && <span className="text-green-500 text-sm font-medium">✓ готово</span>}
        </div>
        <div className="flex gap-1 bg-gray-100 rounded-xl p-1">
          {[['today','Сегодня'],['posture','Осанка'],['agility','Ловкость'],['progress','Прогресс']].map(([v,label]) => (
            <button key={v} onClick={() => setView(v)}
              className={`flex-1 py-2 rounded-lg text-xs font-semibold transition-colors ${view===v ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-400 hover:text-gray-600'}`}>
              {label}
            </button>
          ))}
        </div>
      </header>

      <main className="flex-1 px-4 pt-4 pb-10">
        {view === 'today' && <TodayView progress={progress} onSave={handleSave} />}
        {view === 'posture' && <PostureView />}
        {view === 'agility' && <AgilityView />}
        {view === 'progress' && <ProgressView progress={progress} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
